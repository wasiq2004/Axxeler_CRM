# ═══════════════════════════════════════════════════════════════════════════════
#  Axxeler CRM — Production Docker Compose
#  Live URL  : https://crm.axxeler.in
#  Images    : ghcr.io/wasiq2004/axxeler-crm-*:latest  (built by GitHub Actions)
#  Auto-deploy: Watchtower checks for new images every 5 min after every git push
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     axxeler
      POSTGRES_PASSWORD: Axx3l3rDB@Secure2024
      POSTGRES_DB:       axxeler_crm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axxeler -d axxeler_crm"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend — Express API + BullMQ workers ────────────────────────────────────
  backend:
    image: ghcr.io/wasiq2004/axxeler-crm-backend:latest
    restart: unless-stopped
    environment:
      NODE_ENV:               production
      PORT:                   "4000"
      DATABASE_URL:           postgresql://axxeler:Axx3l3rDB@Secure2024@db:5432/axxeler_crm
      REDIS_URL:              redis://redis:6379
      JWT_ACCESS_SECRET:      "nTbLtxcRcsiUhf91NJ5L0sUJUNymhlt8qH6Gg28cNVwGEYO48JzUfKxHyYJIHo8a"
      JWT_REFRESH_SECRET:     "NZGjr/Ed/dYxI003yqtkB/NsDR8bDX9v8oiE0Zk+byWa1eIC3SRm0i+KDKIh5EKX"
      ACCESS_TOKEN_TTL:       15m
      REFRESH_TOKEN_TTL_DAYS: "30"
      CLIENT_ORIGIN:          https://crm.axxeler.in
      ENABLE_WORKERS:         "true"
      RESEND_API_KEY:         re_ZZ5QJUP4_JrDSd7dUJW7PaJ9CjHRyWMZT
      EMAIL_FROM:             "Axxeler CRM <noreply@axxeler.in>"
      META_REDIRECT_URI:      https://crm.axxeler.in/api/meta/callback
      META_APP_ID:            ""
      META_APP_SECRET:        ""
      META_WEBHOOK_VERIFY_TOKEN: ""
      WHATSAPP_GRAPH_VERSION: v20.0
      RAZORPAY_KEY_ID:        ""
      RAZORPAY_KEY_SECRET:    ""
      UPLOAD_DIR:             /app/uploads
    volumes:
      - uploads_data:/app/uploads
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Frontend — Nginx SPA + API proxy → Traefik ───────────────────────────────
  frontend:
    image: ghcr.io/wasiq2004/axxeler-crm-frontend:latest
    restart: unless-stopped
    networks:
      - internal
      - web
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.axxeler-crm.rule=Host(`crm.axxeler.in`)"
      - "traefik.http.routers.axxeler-crm.entrypoints=websecure"
      - "traefik.http.routers.axxeler-crm.tls=true"
      - "traefik.http.routers.axxeler-crm.tls.certresolver=letsencrypt"
      - "traefik.http.services.axxeler-crm.loadbalancer.server.port=80"
      - "traefik.http.routers.axxeler-crm-http.rule=Host(`crm.axxeler.in`)"
      - "traefik.http.routers.axxeler-crm-http.entrypoints=web"
      - "traefik.http.routers.axxeler-crm-http.middlewares=https-redirect@docker"
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.https-redirect.redirectscheme.permanent=true"

  # ── Watchtower — auto-pulls new images when you push code ─────────────────────
  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_POLL_INTERVAL: "300"      # check every 5 minutes
      WATCHTOWER_CLEANUP:       "true"     # delete old images automatically
      WATCHTOWER_INCLUDE_STOPPED: "false"
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  internal:
    driver: bridge
  web:
    external: true
