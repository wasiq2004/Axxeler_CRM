server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow image/avatar/logo uploads and CSV imports (nginx default is only 1 MB).
    client_max_body_size 6M;

    # Proxy all API requests to the backend container.
    # The `^~` prefix gives this priority over the static-asset regex location
    # below, so requests like /api/uploads/avatar.png are proxied to the backend
    # (and served from the uploads volume) instead of being matched as static
    # files and 404'd.
    location ^~ /api/ {
        proxy_pass         http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Serve the React SPA — fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
